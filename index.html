<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คลินิกเวชกรรมแพทย์ณัฐดนัย</title>
  <style>
    html, body, #root { margin:0; padding:0; min-height:100vh; }
    body { font-family: 'Sarabun', sans-serif; }
    #loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; background:#1a5276; color:#fff; z-index:9999;
      padding: 20px; text-align:center;
    }
    #errbox {
      display:none; background:#fff; color:#c0392b; border-radius:8px;
      padding:14px 18px; margin-top:20px; max-width:90vw; text-align:left;
      font-family:monospace; font-size:12px; white-space:pre-wrap; word-break:break-word;
      max-height:50vh; overflow:auto;
    }
  </style>

  <!-- React + ReactDOM (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div style="font-size:48px;margin-bottom:12px;">🏥</div>
      <div style="font-size:16px;font-weight:700;">กำลังโหลดระบบคลินิก...</div>
      <div id="errbox"></div>
    </div>
  </div>

  <!-- Global error catcher: shows real error instead of infinite loading -->
  <script>
    window.addEventListener('error', function(e) {
      var box = document.getElementById('errbox');
      if (!box) return;
      box.style.display = 'block';
      box.textContent = '❌ Error: ' + (e.message || e.error) +
        '\n\nFile: ' + (e.filename || '?') +
        '\nLine: ' + (e.lineno || '?') + ', Col: ' + (e.colno || '?');
    });
  </script>

  <!--
    clinic-dashboard.js is PLAIN compiled JavaScript (JSX already transformed
    to React.createElement calls ahead of time). No in-browser Babel step,
    no dynamically-injected <script> tags — this is loaded the same static
    way as the react/react-dom tags above, which is the most reliable way
    to run on hosts with stricter script/security policies.
  -->
  <script src="./clinic-dashboard.js?v=3"></script>

  <script>
    try {
      if (typeof ClinicDashboard === 'undefined') {
        throw new Error('ClinicDashboard component was not found. Make sure clinic-dashboard.js is uploaded next to index.html (same folder) and is the compiled JS file, not the old .jsx file.');
      }
      var root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(ClinicDashboard));
    } catch (err) {
      var box = document.getElementById('errbox');
      box.style.display = 'block';
      box.textContent = '❌ JS Error:\n' + (err.message || err);
      console.error(err);
    }
  </script>
</body>
</html>
