<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คลินิกเวชกรรมแพทย์ณัฐดนัย</title>
  <style>
    html, body, #root { margin:0; padding:0; min-height:100vh; }
    body { font-family: 'Sarabun', sans-serif; }
    #loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; background:#1a5276; color:#fff; z-index:9999;
      padding: 20px; text-align:center;
    }
    #errbox {
      display:none; background:#fff; color:#c0392b; border-radius:8px;
      padding:14px 18px; margin-top:20px; max-width:90vw; text-align:left;
      font-family:monospace; font-size:12px; white-space:pre-wrap; word-break:break-word;
      max-height:50vh; overflow:auto;
    }
  </style>

  <!-- React + ReactDOM (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel for in-browser JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div style="font-size:48px;margin-bottom:12px;">🏥</div>
      <div style="font-size:16px;font-weight:700;">กำลังโหลดระบบคลินิก...</div>
      <div id="errbox"></div>
    </div>
  </div>

  <!-- Global error catcher: shows real error instead of infinite loading -->
  <script>
    window.addEventListener('error', function(e) {
      var box = document.getElementById('errbox');
      if (!box) return;
      box.style.display = 'block';
      box.textContent = '❌ Error: ' + (e.message || e.error) +
        '\n\nFile: ' + (e.filename || '?') +
        '\nLine: ' + (e.lineno || '?') + ', Col: ' + (e.colno || '?');
    });
  </script>

  <!-- Fetch the JSX source manually so we can catch network/CORS errors explicitly -->
  <script>
    fetch('./clinic-dashboard.jsx?v=' + Date.now())
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status + ' loading clinic-dashboard.jsx — check the file exists in the repo root next to index.html');
        return res.text();
      })
      .then(function(code) {
        var script = document.createElement('script');
        script.type = 'text/babel';
        script.setAttribute('data-presets', 'react');
        script.text = code;
        document.body.appendChild(script);

        // Babel needs a moment to transform + execute the injected script
        setTimeout(function() {
          try {
            if (typeof ClinicDashboard === 'undefined') {
              throw new Error('ClinicDashboard component was not found after loading clinic-dashboard.jsx. The file may have a syntax error that Babel could not report — check browser console.');
            }
            Babel.transform(code, { presets: ['react'] }); // re-validate, throws if invalid syntax
            var root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(ClinicDashboard));
          } catch (err) {
            var box = document.getElementById('errbox');
            box.style.display = 'block';
            box.textContent = '❌ JS Error:\n' + (err.message || err);
            console.error(err);
          }
        }, 300);
      })
      .catch(function(err) {
        var box = document.getElementById('errbox');
        box.style.display = 'block';
        box.textContent = '❌ Load Error:\n' + err.message;
        console.error(err);
      });
  </script>
</body>
</html>
