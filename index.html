<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>คลินิกเวชกรรมแพทย์ณัฐดนัย</title>
  <style>
    html, body, #root { margin:0; padding:0; min-height:100vh; }
    body { font-family: 'Sarabun', sans-serif; }
    #loading {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; background:#1a5276; color:#fff; z-index:9999;
    }
  </style>

  <!-- React + ReactDOM (production builds) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel for in-browser JSX transpilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div style="font-size:48px;margin-bottom:12px;">🏥</div>
      <div style="font-size:16px;font-weight:700;">กำลังโหลดระบบคลินิก...</div>
    </div>
  </div>

  <!-- Load the app source as Babel-typed JSX (defines global ClinicDashboard) -->
  <script type="text/babel" src="./clinic-dashboard.jsx"></script>

  <!-- Mount -->
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(ClinicDashboard));
  </script>
</body>
</html>
